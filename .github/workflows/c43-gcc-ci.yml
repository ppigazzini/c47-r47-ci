name: c43 GCC CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  UPSTREAM_URL: https://gitlab.com/rpncalculators/c43.git
  XLSXIO_URL: https://github.com/brechtsanders/xlsxio.git
  XLSXIO_COMMIT: a9016eb2eb46dcd613a68fcfcd1002b5adf64ae9

jobs:
  resolve-upstream-core:
    name: Resolve authoritative upstream c43 revision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      upstream_url: ${{ steps.resolve.outputs.upstream_url }}
      upstream_commit: ${{ steps.resolve.outputs.upstream_commit }}
      upstream_short: ${{ steps.resolve.outputs.upstream_short }}
    steps:
      - name: Resolve authoritative upstream c43 commit
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit=$(git ls-remote --exit-code "$UPSTREAM_URL" refs/heads/master | awk 'NR == 1 { print $1 }')
          if [[ -z "$upstream_commit" ]]; then
            echo "Failed to resolve upstream master." >&2
            exit 1
          fi

          echo "upstream_url=$UPSTREAM_URL" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$upstream_commit" >> "$GITHUB_OUTPUT"
          echo "upstream_short=${upstream_commit:0:12}" >> "$GITHUB_OUTPUT"

  linux-tests:
    name: Run Linux simulator tests
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            zip

      - name: Set pinned xlsxio revision
        id: xlsxio
        shell: bash
        run: |
          set -euo pipefail

          echo "xlsxio_url=$XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/c43/xlsxio/$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Restore xlsxio toolchain cache
        id: xlsxio-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
          key: ${{ runner.os }}-xlsxio-${{ steps.xlsxio.outputs.xlsxio_commit }}-static-tools-v1

      - name: Build xlsxio toolchain
        if: steps.xlsxio-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          XLSXIO_URL: ${{ steps.xlsxio.outputs.xlsxio_url }}
          XLSXIO_COMMIT: ${{ steps.xlsxio.outputs.xlsxio_commit }}
          XLSXIO_PREFIX: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
        run: |
          set -euo pipefail

          xlsxio_dir="${RUNNER_TEMP}/xlsxio"
          rm -rf "$xlsxio_dir"
          git init "$xlsxio_dir"
          git -C "$xlsxio_dir" remote add origin "$XLSXIO_URL"
          git -C "$xlsxio_dir" fetch --depth 1 origin "$XLSXIO_COMMIT"
          git -C "$xlsxio_dir" checkout --detach FETCH_HEAD

          mkdir -p "$XLSXIO_PREFIX"

          cmake -S "$xlsxio_dir" -B "$xlsxio_dir/build" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_STATIC=ON \
            -DBUILD_SHARED=OFF \
            -DBUILD_DOCUMENTATION=FALSE \
            -DBUILD_EXAMPLES=FALSE \
            -DBUILD_TOOLS=ON \
            -DWITH_LIBZIP=OFF

          cmake --build "$xlsxio_dir/build" --parallel "${{ steps.jobs.outputs.jobs }}"
          cmake --install "$xlsxio_dir/build" --prefix "$XLSXIO_PREFIX"

      - name: Expose xlsxio toolchain
        shell: bash
        run: |
          set -euo pipefail

          echo "${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin" >> "$GITHUB_PATH"
          export PATH="${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin:$PATH"
          xlsxio_xlsx2csv -h > /dev/null

      - name: Sync authoritative upstream c43
        id: upstream
        shell: bash
        env:
          UPSTREAM_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          rm -rf upstream
          git init upstream
          git -C upstream remote add origin "$UPSTREAM_URL"
          git -C upstream fetch --depth 1 origin "$UPSTREAM_COMMIT"
          git -C upstream checkout --detach FETCH_HEAD
          git -C upstream submodule update --init --recursive --depth 1

          echo "upstream_dir=$PWD/upstream" >> "$GITHUB_OUTPUT"

      - name: Run Linux simulator tests
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail

          chmod +x tools/onARaspberry
          mkdir -p ../ci-artifacts/logs

          export CC=gcc
          export CXX=g++

          make test 2>&1 | tee ../ci-artifacts/logs/linux-tests.log

      - name: Upload Linux test log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-linux-tests-${{ needs.resolve-upstream-core.outputs.upstream_short }}-log
          path: ci-artifacts/logs/linux-tests.log
          if-no-files-found: warn
          retention-days: 14

  linux-docs:
    name: Build Linux docs
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Install Linux docs dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            doxygen \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            meson \
            ninja-build \
            pkg-config \
            python3-breathe \
            python3-pip \
            python3-sphinx \
            unzip \
            zip

      - name: Install Furo theme
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user furo

      - name: Set pinned xlsxio revision
        id: xlsxio
        shell: bash
        run: |
          set -euo pipefail

          echo "xlsxio_url=$XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/c43/xlsxio/$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Restore xlsxio toolchain cache
        id: xlsxio-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
          key: ${{ runner.os }}-xlsxio-${{ steps.xlsxio.outputs.xlsxio_commit }}-static-tools-v1

      - name: Build xlsxio toolchain
        if: steps.xlsxio-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          XLSXIO_URL: ${{ steps.xlsxio.outputs.xlsxio_url }}
          XLSXIO_COMMIT: ${{ steps.xlsxio.outputs.xlsxio_commit }}
          XLSXIO_PREFIX: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
        run: |
          set -euo pipefail

          xlsxio_dir="${RUNNER_TEMP}/xlsxio"
          rm -rf "$xlsxio_dir"
          git init "$xlsxio_dir"
          git -C "$xlsxio_dir" remote add origin "$XLSXIO_URL"
          git -C "$xlsxio_dir" fetch --depth 1 origin "$XLSXIO_COMMIT"
          git -C "$xlsxio_dir" checkout --detach FETCH_HEAD

          mkdir -p "$XLSXIO_PREFIX"

          cmake -S "$xlsxio_dir" -B "$xlsxio_dir/build" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_STATIC=ON \
            -DBUILD_SHARED=OFF \
            -DBUILD_DOCUMENTATION=FALSE \
            -DBUILD_EXAMPLES=FALSE \
            -DBUILD_TOOLS=ON \
            -DWITH_LIBZIP=OFF

          cmake --build "$xlsxio_dir/build" --parallel "${{ steps.jobs.outputs.jobs }}"
          cmake --install "$xlsxio_dir/build" --prefix "$XLSXIO_PREFIX"

      - name: Expose xlsxio toolchain
        shell: bash
        run: |
          set -euo pipefail

          echo "${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin" >> "$GITHUB_PATH"
          export PATH="${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin:$PATH"
          xlsxio_xlsx2csv -h > /dev/null

      - name: Sync authoritative upstream c43
        shell: bash
        env:
          UPSTREAM_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          rm -rf upstream
          git init upstream
          git -C upstream remote add origin "$UPSTREAM_URL"
          git -C upstream fetch --depth 1 origin "$UPSTREAM_COMMIT"
          git -C upstream checkout --detach FETCH_HEAD
          git -C upstream submodule update --init --recursive --depth 1

      - name: Build Linux docs
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail

          chmod +x tools/onARaspberry
          mkdir -p ../ci-artifacts/logs

          export CC=gcc
          export CXX=g++

          make docs 2>&1 | tee ../ci-artifacts/logs/linux-docs.log

      - name: Upload Linux docs log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-linux-docs-${{ needs.resolve-upstream-core.outputs.upstream_short }}-log
          path: ci-artifacts/logs/linux-docs.log
          if-no-files-found: warn
          retention-days: 14

  linux-package:
    name: Build Linux simulator package (GCC)
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Install Linux packaging dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            xvfb \
            zip

      - name: Set pinned xlsxio revision
        id: xlsxio
        shell: bash
        run: |
          set -euo pipefail

          echo "xlsxio_url=$XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/c43/xlsxio/$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Restore xlsxio toolchain cache
        id: xlsxio-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
          key: ${{ runner.os }}-xlsxio-${{ steps.xlsxio.outputs.xlsxio_commit }}-static-tools-v1

      - name: Build xlsxio toolchain
        if: steps.xlsxio-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          XLSXIO_URL: ${{ steps.xlsxio.outputs.xlsxio_url }}
          XLSXIO_COMMIT: ${{ steps.xlsxio.outputs.xlsxio_commit }}
          XLSXIO_PREFIX: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
        run: |
          set -euo pipefail

          xlsxio_dir="${RUNNER_TEMP}/xlsxio"
          rm -rf "$xlsxio_dir"
          git init "$xlsxio_dir"
          git -C "$xlsxio_dir" remote add origin "$XLSXIO_URL"
          git -C "$xlsxio_dir" fetch --depth 1 origin "$XLSXIO_COMMIT"
          git -C "$xlsxio_dir" checkout --detach FETCH_HEAD

          mkdir -p "$XLSXIO_PREFIX"

          cmake -S "$xlsxio_dir" -B "$xlsxio_dir/build" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_STATIC=ON \
            -DBUILD_SHARED=OFF \
            -DBUILD_DOCUMENTATION=FALSE \
            -DBUILD_EXAMPLES=FALSE \
            -DBUILD_TOOLS=ON \
            -DWITH_LIBZIP=OFF

          cmake --build "$xlsxio_dir/build" --parallel "${{ steps.jobs.outputs.jobs }}"
          cmake --install "$xlsxio_dir/build" --prefix "$XLSXIO_PREFIX"

      - name: Expose xlsxio toolchain
        shell: bash
        run: |
          set -euo pipefail

          echo "${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin" >> "$GITHUB_PATH"
          export PATH="${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin:$PATH"
          xlsxio_xlsx2csv -h > /dev/null

      - name: Show GCC toolchain
        shell: bash
        run: |
          set -euo pipefail

          gcc --version
          g++ --version

      - name: Sync authoritative upstream c43
        shell: bash
        env:
          UPSTREAM_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          rm -rf upstream
          git init upstream
          git -C upstream remote add origin "$UPSTREAM_URL"
          git -C upstream fetch --depth 1 origin "$UPSTREAM_COMMIT"
          git -C upstream checkout --detach FETCH_HEAD
          git -C upstream submodule update --init --recursive --depth 1

      - name: Build Linux simulator package
        shell: bash
        working-directory: upstream
        run: |
          set -euo pipefail

          chmod +x tools/onARaspberry
          mkdir -p ../ci-artifacts/logs

          export CC=gcc
          export CXX=g++

          make XVFB=xvfb-run \
            dist_linux 2>&1 | tee ../ci-artifacts/logs/linux-package.log

      - name: Collect stripped Linux package artifact
        shell: bash
        env:
          UPSTREAM_SHORT: ${{ needs.resolve-upstream-core.outputs.upstream_short }}
        run: |
          set -euo pipefail

          release_dir="$PWD/ci-artifacts/release/linux"
          package_zip="$PWD/upstream/c47-linux.zip"
          package_dir="$release_dir/c47-linux"
          stripped_count=0

          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          unzip -q "$package_zip" -d "$release_dir"

          if command -v llvm-strip > /dev/null 2>&1; then
            strip_tool=llvm-strip
          elif command -v strip > /dev/null 2>&1; then
            strip_tool=strip
          else
            echo "No strip tool found in PATH." >&2
            exit 1
          fi

          while IFS= read -r -d '' binary; do
            if ! readelf -h "$binary" > /dev/null 2>&1; then
              continue
            fi

            "$strip_tool" "$binary"
            stripped_count=$((stripped_count + 1))
          done < <(find "$package_dir" -type f -print0)

          cp "$PWD/upstream/COPYING" "$package_dir/COPYING"

          cat > "$package_dir/SOURCE" <<EOF
          upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}
          upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          upstream_license_file=COPYING
          xlsxio_url=${{ env.XLSXIO_URL }}
          xlsxio_commit=${{ env.XLSXIO_COMMIT }}
          EOF

          find "$package_dir" -type f | sed "s#^$release_dir/##" | sort > "$release_dir/PACKAGE-CONTENTS.txt"

          cat > "$release_dir/BUILD-METADATA.txt" <<EOF
          upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}
          upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          upstream_license_file=COPYING
          source_manifest_file=SOURCE
          xlsxio_url=${{ env.XLSXIO_URL }}
          xlsxio_commit=${{ env.XLSXIO_COMMIT }}
          compiler=gcc
          make_target=dist_linux
          strip_tool=$strip_tool
          stripped_files_count=$stripped_count
          package_zip=$(basename "$package_zip")
          package_dir=$(basename "$package_dir")
          EOF

      - name: Upload Linux simulator artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-linux-gcc-${{ needs.resolve-upstream-core.outputs.upstream_short }}
          path: ci-artifacts/release/linux/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-linux-gcc-${{ needs.resolve-upstream-core.outputs.upstream_short }}-build-log
          path: ci-artifacts/logs/linux-package.log
          if-no-files-found: warn
          retention-days: 14

  windows-msys2-ucrt64-package:
    name: Build Windows simulator package (MSYS2 UCRT64 GCC)
    needs:
      - resolve-upstream-core
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Configure Git defaults
        shell: pwsh
        run: |
          git config --global core.autocrlf input
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: UCRT64
          cache: true
          update: true
          path-type: minimal
          install: >-
            git
            make
            unzip
            zip
            mingw-w64-ucrt-x86_64-ca-certificates
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-gmp
            mingw-w64-ucrt-x86_64-gtk3
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-xlsxio

      - name: Verify MSYS2 toolchain
        run: |
          set -euo pipefail

          gcc --version
          g++ --version
          meson --version
          pkg-config --modversion gtk+-3.0
          command -v xlsxio_xlsx2csv > /dev/null

      - name: Detect runner build concurrency
        id: jobs
        run: |
          set -euo pipefail
          echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Sync authoritative upstream c43
        run: |
          set -euo pipefail

          rm -rf upstream
          git init upstream
          git -C upstream remote add origin "${{ needs.resolve-upstream-core.outputs.upstream_url }}"
          git -C upstream fetch --depth 1 origin "${{ needs.resolve-upstream-core.outputs.upstream_commit }}"
          git -C upstream checkout --detach FETCH_HEAD
          git -C upstream submodule update --init --recursive --depth 1

      - name: Load packaged Windows font into runner session
        shell: pwsh
        run: |
          $fontPath = Join-Path $PWD "upstream\res\fonts\C47__StandardFont.ttf"
          if (-not (Test-Path $fontPath)) {
            throw "Expected font file not found: $fontPath"
          }

          Add-Type -TypeDefinition @'
          using System;
          using System.Runtime.InteropServices;

          public static class C47FontLoader {
              [DllImport("gdi32.dll", CharSet = CharSet.Unicode, EntryPoint = "AddFontResourceW", SetLastError = true)]
              public static extern int AddFontResource(string lpFileName);

              [DllImport("user32.dll", EntryPoint = "SendMessageW", SetLastError = true)]
              public static extern IntPtr SendMessage(IntPtr hWnd, uint Msg, IntPtr wParam, IntPtr lParam);
          }
          '@

          $fontsAdded = [C47FontLoader]::AddFontResource($fontPath)
          if ($fontsAdded -lt 1) {
            throw "AddFontResource failed for $fontPath"
          }

          [void][C47FontLoader]::SendMessage([IntPtr]0xffff, 0x001D, [IntPtr]::Zero, [IntPtr]::Zero)
          Write-Host "Loaded $fontsAdded font resource(s) from $fontPath"

      - name: Build Windows simulator package
        run: |
          set -euo pipefail

          mkdir -p ci-artifacts/logs
          cd upstream
          chmod +x tools/onARaspberry

          export CC=gcc
          export CXX=g++

          make dist_windows 2>&1 | tee ../ci-artifacts/logs/windows-ucrt64-gcc-package.log

      - name: Bundle stripped Windows runtime
        id: bundle
        env:
          UPSTREAM_SHORT: ${{ needs.resolve-upstream-core.outputs.upstream_short }}
        run: |
          set -euo pipefail

          log_file="ci-artifacts/logs/windows-ucrt64-gcc-package.log"
          artifact_dir="artifact-ucrt64-gcc"
          release_dir="$artifact_dir/release"
          package_dir="$release_dir/c47-windows"
          stripped_count=0

          rm -rf "$artifact_dir"
          mkdir -p "$release_dir"

          unzip -q upstream/c47-windows.zip -d "$release_dir"

          if command -v llvm-strip > /dev/null 2>&1; then
            strip_tool=llvm-strip
          elif command -v strip > /dev/null 2>&1; then
            strip_tool=strip
          else
            echo "No strip tool found in PATH." >&2
            exit 1
          fi

          "$strip_tool" "$package_dir/c47.exe" "$package_dir/r47.exe"
          stripped_count=2

          dlls=$(for exe in "$package_dir/c47.exe" "$package_dir/r47.exe"; do
            ldd "$exe"
          done | awk -v prefix="$MINGW_PREFIX/bin/" '
            $3 ~ ("^" prefix) && $3 ~ /\.dll$/ { print $3 }
            $1 ~ ("^" prefix) && $1 ~ /\.dll$/ { print $1 }
          ' | sort -u)

          if [[ -z "$dlls" ]]; then
            echo "Failed to resolve runtime DLLs from $MINGW_PREFIX/bin." >&2
            exit 1
          fi

          while IFS= read -r dll; do
            [[ -n "$dll" ]] || continue
            cp "$dll" "$package_dir/"
          done <<< "$dlls"

          printf 'Stripped executable sizes:\n'
          stat -c '%n %s' "$package_dir/c47.exe" "$package_dir/r47.exe"

          cp upstream/COPYING "$package_dir/COPYING"

          cat > "$package_dir/SOURCE" <<EOF
          upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}
          upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          upstream_license_file=COPYING
          xlsxio_url=${{ env.XLSXIO_URL }}
          xlsxio_commit=${{ env.XLSXIO_COMMIT }}
          EOF

          find "$package_dir" -type f | sed "s#^$release_dir/##" | sort > "$release_dir/PACKAGE-CONTENTS.txt"

          cat > "$release_dir/BUILD-METADATA.txt" <<EOF
          upstream_url=${{ needs.resolve-upstream-core.outputs.upstream_url }}
          upstream_commit=${{ needs.resolve-upstream-core.outputs.upstream_commit }}
          upstream_license_file=COPYING
          source_manifest_file=SOURCE
          xlsxio_url=${{ env.XLSXIO_URL }}
          xlsxio_commit=${{ env.XLSXIO_COMMIT }}
          make_target=dist_windows
          compiler=gcc
          msystem=UCRT64
          strip_tool=$strip_tool
          stripped_files_count=$stripped_count
          package_dir=$(basename "$package_dir")
          EOF

          echo "artifact_path=$release_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Windows simulator artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-windows-ucrt64-gcc-${{ needs.resolve-upstream-core.outputs.upstream_short }}
          path: ${{ steps.bundle.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-windows-ucrt64-gcc-${{ needs.resolve-upstream-core.outputs.upstream_short }}-build-log
          path: ci-artifacts/logs/windows-ucrt64-gcc-package.log
          if-no-files-found: warn
          retention-days: 14