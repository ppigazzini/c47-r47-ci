name: Test Nested-Engine Recursion
# Thin CI caller for scripts/test/run-nestcheck.sh. All logic lives in the
# script so it runs identically on a maintainer's machine.
#
# The lane assembles the self-referential engine-nesting probes (p47asm.py),
# builds the upstream simulator, and runs each headless, classifying
# survived/crashed/hung. It is REPORT-ONLY here (NESTCHECK_GATE unset -> 0):
# upstream master currently crashes on the SOLVE/SUM/PLOT probes, so a hard gate
# would fail every run. The lane's value in report-only mode is the standing
# count in the log - it says on every run how many self-referential nests
# upstream still cannot bound. Set NESTCHECK_GATE=1 in the env once the nesting
# budget merges to turn it into a regression gate.

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  nestcheck:
    name: Nested-engine recursion check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        # The same list the UI lane uses to build the simulator, minus xvfb
        # (t47 runs headless). cmake/libminizip-dev/libexpat1-dev are for the
        # xlsxio toolchain harness_setup_xlsxio builds; without libminizip-dev
        # its CMake configure fails on FindMinizip.
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ca-certificates \
            ccache \
            cmake \
            git \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config
      - name: Cache xlsxio toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/c43/xlsxio
          key: ${{ runner.os }}-xlsxio-a9016eb2-static-tools-v1
      - name: Run nestcheck (report-only)
        run: bash scripts/test/run-nestcheck.sh
