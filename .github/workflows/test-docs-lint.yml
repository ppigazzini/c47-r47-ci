name: Docs Lint
# Thin CI caller for the docs rot gate.
# All logic lives in scripts/test/run-docs-lint.sh so it runs identically on a
# maintainer's machine. Unlike the other lanes this one needs no upstream clone
# and no toolchain: it only reads this repository, so it finishes in seconds.

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  docs-lint:
    name: Docs rot gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out planning repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run docs rot gate
        shell: bash
        run: bash scripts/test/run-docs-lint.sh
