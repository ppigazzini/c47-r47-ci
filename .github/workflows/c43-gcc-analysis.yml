name: c43 GCC Analysis

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  UPSTREAM_URL: https://gitlab.com/rpncalculators/c43.git
  XLSXIO_URL: https://github.com/brechtsanders/xlsxio.git
  XLSXIO_COMMIT: a9016eb2eb46dcd613a68fcfcd1002b5adf64ae9

jobs:
  resolve-upstream-core:
    name: Resolve authoritative upstream c43 revision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      upstream_url: ${{ steps.resolve.outputs.upstream_url }}
      upstream_commit: ${{ steps.resolve.outputs.upstream_commit }}
      upstream_short: ${{ steps.resolve.outputs.upstream_short }}
    steps:
      - name: Resolve authoritative upstream c43 commit
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit=$(git ls-remote --exit-code "$UPSTREAM_URL" refs/heads/master | awk 'NR == 1 { print $1 }')
          if [[ -z "$upstream_commit" ]]; then
            echo "Failed to resolve upstream master." >&2
            exit 1
          fi

          echo "upstream_url=$UPSTREAM_URL" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$upstream_commit" >> "$GITHUB_OUTPUT"
          echo "upstream_short=${upstream_commit:0:12}" >> "$GITHUB_OUTPUT"

  gcc-asan-ubsan:
    name: Analyze simulator with GCC ASan and UBSan
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Install Linux analysis dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            xvfb \
            zip

      - name: Set pinned xlsxio revision
        id: xlsxio
        shell: bash
        run: |
          set -euo pipefail

          echo "xlsxio_url=$XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/c43/xlsxio/$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Restore xlsxio toolchain cache
        id: xlsxio-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
          key: ${{ runner.os }}-xlsxio-${{ steps.xlsxio.outputs.xlsxio_commit }}-static-tools-v1

      - name: Build xlsxio toolchain
        if: steps.xlsxio-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          XLSXIO_URL: ${{ steps.xlsxio.outputs.xlsxio_url }}
          XLSXIO_COMMIT: ${{ steps.xlsxio.outputs.xlsxio_commit }}
          XLSXIO_PREFIX: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
        run: |
          set -euo pipefail

          xlsxio_dir="${RUNNER_TEMP}/xlsxio"
          rm -rf "$xlsxio_dir"
          git init "$xlsxio_dir"
          git -C "$xlsxio_dir" remote add origin "$XLSXIO_URL"
          git -C "$xlsxio_dir" fetch --depth 1 origin "$XLSXIO_COMMIT"
          git -C "$xlsxio_dir" checkout --detach FETCH_HEAD

          mkdir -p "$XLSXIO_PREFIX"

          cmake -S "$xlsxio_dir" -B "$xlsxio_dir/build" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_STATIC=ON \
            -DBUILD_SHARED=OFF \
            -DBUILD_DOCUMENTATION=FALSE \
            -DBUILD_EXAMPLES=FALSE \
            -DBUILD_TOOLS=ON \
            -DWITH_LIBZIP=OFF

          cmake --build "$xlsxio_dir/build" --parallel "${{ steps.jobs.outputs.jobs }}"
          cmake --install "$xlsxio_dir/build" --prefix "$XLSXIO_PREFIX"

      - name: Expose xlsxio toolchain
        shell: bash
        run: |
          set -euo pipefail

          echo "${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin" >> "$GITHUB_PATH"
          export PATH="${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin:$PATH"
          xlsxio_xlsx2csv -h > /dev/null

      - name: Show GCC toolchain
        shell: bash
        run: |
          set -euo pipefail

          gcc --version
          g++ --version

      - name: Sync authoritative upstream c43
        shell: bash
        env:
          UPSTREAM_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          rm -rf upstream
          git init upstream
          git -C upstream remote add origin "$UPSTREAM_URL"
          git -C upstream fetch --depth 1 origin "$UPSTREAM_COMMIT"
          git -C upstream checkout --detach FETCH_HEAD
          git -C upstream submodule update --init --recursive --depth 1

      - name: Run GCC ASan and UBSan analysis
        shell: bash
        working-directory: upstream
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          set -euo pipefail

          chmod +x tools/onARaspberry
          mkdir -p ../ci-artifacts/logs

          export CC=gcc
          export CXX=g++

          raspberry="$(./tools/onARaspberry)"
          build_dir="build.gcc-sanitize"
          rm -rf "$build_dir"

          {
            meson setup "$build_dir" \
              --buildtype=custom \
              -DRASPBERRY="$raspberry" \
              -DDECNUMBER_FASTMUL=true \
              -Dc_args="-Wno-deprecated-declarations" \
              -Db_sanitize=address,undefined

            ninja -C "$build_dir" sim simr47
            meson test -C "$build_dir" --print-errorlogs

            cp "$build_dir/src/c47-gtk/c47" ./c47
            cp "$build_dir/src/c47-gtk/r47" ./r47

            xvfb-run -a ./c47 --writeexportall
            xvfb-run -a ./r47 --writeexportall
          } 2>&1 | tee ../ci-artifacts/logs/gcc-asan-ubsan.log

          if [[ -f "$build_dir/meson-logs/testlog.txt" ]]; then
            cp "$build_dir/meson-logs/testlog.txt" ../ci-artifacts/logs/gcc-asan-ubsan-testlog.txt
          fi

      - name: Upload GCC ASan and UBSan logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-gcc-asan-ubsan-${{ needs.resolve-upstream-core.outputs.upstream_short }}-logs
          path: ci-artifacts/logs/
          if-no-files-found: warn
          retention-days: 14

  gcc-valgrind:
    name: Analyze simulator with GCC and Valgrind
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Install Linux Valgrind dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            valgrind \
            xvfb \
            zip

      - name: Set pinned xlsxio revision
        id: xlsxio
        shell: bash
        run: |
          set -euo pipefail

          echo "xlsxio_url=$XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/c43/xlsxio/$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Restore xlsxio toolchain cache
        id: xlsxio-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
          key: ${{ runner.os }}-xlsxio-${{ steps.xlsxio.outputs.xlsxio_commit }}-static-tools-v1

      - name: Build xlsxio toolchain
        if: steps.xlsxio-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          XLSXIO_URL: ${{ steps.xlsxio.outputs.xlsxio_url }}
          XLSXIO_COMMIT: ${{ steps.xlsxio.outputs.xlsxio_commit }}
          XLSXIO_PREFIX: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
        run: |
          set -euo pipefail

          xlsxio_dir="${RUNNER_TEMP}/xlsxio"
          rm -rf "$xlsxio_dir"
          git init "$xlsxio_dir"
          git -C "$xlsxio_dir" remote add origin "$XLSXIO_URL"
          git -C "$xlsxio_dir" fetch --depth 1 origin "$XLSXIO_COMMIT"
          git -C "$xlsxio_dir" checkout --detach FETCH_HEAD

          mkdir -p "$XLSXIO_PREFIX"

          cmake -S "$xlsxio_dir" -B "$xlsxio_dir/build" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_STATIC=ON \
            -DBUILD_SHARED=OFF \
            -DBUILD_DOCUMENTATION=FALSE \
            -DBUILD_EXAMPLES=FALSE \
            -DBUILD_TOOLS=ON \
            -DWITH_LIBZIP=OFF

          cmake --build "$xlsxio_dir/build" --parallel "${{ steps.jobs.outputs.jobs }}"
          cmake --install "$xlsxio_dir/build" --prefix "$XLSXIO_PREFIX"

      - name: Expose xlsxio toolchain
        shell: bash
        run: |
          set -euo pipefail

          echo "${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin" >> "$GITHUB_PATH"
          export PATH="${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin:$PATH"
          xlsxio_xlsx2csv -h > /dev/null

      - name: Show GCC toolchain
        shell: bash
        run: |
          set -euo pipefail

          gcc --version
          g++ --version

      - name: Sync authoritative upstream c43
        shell: bash
        env:
          UPSTREAM_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          rm -rf upstream
          git init upstream
          git -C upstream remote add origin "$UPSTREAM_URL"
          git -C upstream fetch --depth 1 origin "$UPSTREAM_COMMIT"
          git -C upstream checkout --detach FETCH_HEAD
          git -C upstream submodule update --init --recursive --depth 1

      - name: Run GCC Valgrind analysis
        shell: bash
        working-directory: upstream
        env:
          G_DEBUG: gc-friendly
          G_SLICE: always-malloc
        run: |
          set -euo pipefail

          chmod +x tools/onARaspberry
          mkdir -p ../ci-artifacts/logs

          export CC=gcc
          export CXX=g++

          {
            make both

            xvfb-run -a valgrind \
              --error-exitcode=1 \
              --leak-check=full \
              --show-leak-kinds=definite,indirect \
              --errors-for-leak-kinds=definite \
              --track-origins=yes \
              ./c47 --writeexportall

            xvfb-run -a valgrind \
              --error-exitcode=1 \
              --leak-check=full \
              --show-leak-kinds=definite,indirect \
              --errors-for-leak-kinds=definite \
              --track-origins=yes \
              ./r47 --writeexportall
          } 2>&1 | tee ../ci-artifacts/logs/gcc-valgrind.log

      - name: Upload GCC Valgrind log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: c43-gcc-valgrind-${{ needs.resolve-upstream-core.outputs.upstream_short }}-log
          path: ci-artifacts/logs/gcc-valgrind.log
          if-no-files-found: warn
          retention-days: 14