name: Per-Test Memory Gate
# Thin CI caller for the per-test pool/GMP attribution gate. The lane sets up the toolchain and calls scripts/test/run-testmem.sh,
# which runs the upstream test corpus under testSuite --testmem and fails on any
# per-test pool/GMP growth not in scripts/test/testmem-baseline.txt. This turns
# the exit-only GMP check into per-operation attribution.

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  per-test-memory-gate:
    name: Per-test pool and GMP gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LOG_DIR: ${{ github.workspace }}/ci-artifacts/logs
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ccache \
            cmake \
            git \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            wget \
            zip

      - name: Cache xlsxio toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/c43/xlsxio
          key: ${{ runner.os }}-xlsxio-a9016eb2-static-tools-v1

      - name: Run per-test memory gate
        shell: bash
        run: bash scripts/test/run-testmem.sh

      - name: Upload per-test memory logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: per-test-memory-gate-logs
          path: ci-artifacts/logs/
          if-no-files-found: warn
          retention-days: 14
