name: Coverage Map
# Thin CI caller for the coverage lane. The lane sets up
# the toolchain and calls scripts/test/run-coverage.sh, which builds the upstream
# testSuite with gcc coverage instrumentation, exercises it (the 278-file corpus,
# --keyscan and --leakscan), and publishes a gcovr coverage map plus the
# least-covered leak-prone modules. Report-only by default; set COVERAGE_MIN to
# gate on overall line coverage.

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage-map:
    name: Coverage map
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LOG_DIR: ${{ github.workspace }}/ci-artifacts/logs
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ccache \
            cmake \
            gcovr \
            git \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            wget \
            zip

      - name: Cache xlsxio toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/c43/xlsxio
          key: ${{ runner.os }}-xlsxio-a9016eb2-static-tools-v1

      - name: Run coverage lane
        shell: bash
        run: bash scripts/test/run-coverage.sh

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-map
          path: ci-artifacts/logs/
          if-no-files-found: warn
          retention-days: 14
