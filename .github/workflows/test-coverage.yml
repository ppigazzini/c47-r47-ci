name: Coverage Map
# Thin CI caller for the coverage lane. The lane sets up
# the toolchain and calls scripts/test/run-coverage.sh, which builds the upstream
# testSuite with gcc coverage instrumentation, exercises it (the 278-file corpus,
# --keyscan and --leakscan) and publishes a
# gcovr coverage map plus the macro-sector report, direct-reachability report,
# and least-covered leak-prone modules. Ratchet-gated: COVERAGE_MIN gates overall
# line coverage and SECTOR_GATE=1 gates the per-sector floors in
# scripts/test/coverage-floors.txt, so a coverage regression fails the lane.

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage-map:
    name: Coverage map
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LOG_DIR: ${{ github.workspace }}/ci-artifacts/logs
      # Ratchet gates: fail the lane on a coverage regression below the global
      # floor (COVERAGE_MIN) or any per-sector floor (scripts/test/coverage-floors.txt).
      # Raising a floor after a corpus lift, or lowering one, is an explicit,
      # documented change to those files.
      COVERAGE_MIN: "45"
      SECTOR_GATE: "1"
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ccache \
            cmake \
            git \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            wget \
            zip

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install gcovr (latest, via uv)
        shell: bash
        run: |
          set -euo pipefail
          # apt ships gcovr 7, which rejects the finer-grained
          # --gcov-ignore-parse-errors choices (suspicious_hits.*) the coverage
          # lane uses; those landed in gcovr 8. Install the current release with
          # uv so the lane always runs the most recent gcovr. The tool shim lands
          # in uv's tool bin dir; expose it to this step and to the later
          # coverage-lane step (GITHUB_PATH only affects subsequent steps).
          uv tool install --force gcovr
          bindir="$(uv tool dir --bin)"
          echo "$bindir" >> "$GITHUB_PATH"
          export PATH="$bindir:$PATH"
          gcovr --version

      - name: Cache xlsxio toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/c43/xlsxio
          key: ${{ runner.os }}-xlsxio-a9016eb2-static-tools-v1

      - name: Run coverage lane
        shell: bash
        run: bash scripts/test/run-coverage.sh

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-map
          path: ci-artifacts/logs/
          if-no-files-found: warn
          retention-days: 14
