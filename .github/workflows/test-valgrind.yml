name: Valgrind Memcheck
# Thin CI caller for Sets up the toolchain and calls
# scripts/test/run-valgrind.sh, a report-first breadth lane (set its *_GATE to gate).

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  valgrind-memcheck:
    name: Valgrind memcheck
    runs-on: ubuntu-latest
    # memcheck is a ~20-50x slowdown and a few iterative tests dominate; run the
    # full corpus under a large budget (near the 6h GitHub-hosted job cap) to
    # capture the complete report before choosing a time strategy.
    timeout-minutes: 350
    env:
      LOG_DIR: ${{ github.workspace }}/ci-artifacts/logs
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ccache \
            cmake \
            git \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            wget \
            zip \
            valgrind

      - name: Cache xlsxio toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/c43/xlsxio
          key: ${{ runner.os }}-xlsxio-a9016eb2-static-tools-v1

      - name: Run lane
        shell: bash
        run: bash scripts/test/run-valgrind.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: valgrind-memcheck
          path: ci-artifacts/logs/
          if-no-files-found: warn
          retention-days: 14
