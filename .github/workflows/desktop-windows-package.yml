name: desktop-windows-package

on:
  workflow_call:
    inputs:
      artifact_prefix:
        required: true
        type: string
      upstream_url:
        required: true
        type: string
      upstream_commit:
        required: true
        type: string
      upstream_short:
        required: true
        type: string
      xlsxio_url:
        required: true
        type: string
      xlsxio_commit:
        required: true
        type: string
      msystem:
        required: true
        type: string
      msys2_packages:
        required: true
        type: string
      cc:
        required: true
        type: string
      cxx:
        required: true
        type: string
      compiler_label:
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Build Windows simulator package
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Configure Git defaults
        shell: pwsh
        run: |
          git config --global core.autocrlf input
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out planning repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up MSYS2 ${{ inputs.msystem }}
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: ${{ inputs.msystem }}
          cache: true
          update: true
          path-type: minimal
          install: ${{ inputs.msys2_packages }}

      - name: Verify MSYS2 toolchain
        run: |
          set -euo pipefail

          ${{ inputs.cc }} --version
          ${{ inputs.cxx }} --version
          meson --version
          pkg-config --modversion gtk+-3.0
          command -v xlsxio_xlsx2csv > /dev/null

      - name: Detect runner build concurrency
        id: jobs
        run: |
          set -euo pipefail
          echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"

      - name: Sync authoritative upstream c43
        run: |
          set -euo pipefail

          rm -rf upstream
          git init upstream
          git -C upstream remote add origin "${{ inputs.upstream_url }}"
          git -C upstream fetch --depth 1 origin "${{ inputs.upstream_commit }}"
          git -C upstream checkout --detach FETCH_HEAD
          git -C upstream submodule update --init --recursive --depth 1

      - name: Load packaged Windows font into runner session
        shell: pwsh
        run: |
          $fontPath = Join-Path $PWD "upstream\res\fonts\C47__StandardFont.ttf"
          if (-not (Test-Path $fontPath)) {
            throw "Expected font file not found: $fontPath"
          }

          Add-Type -TypeDefinition @'
          using System;
          using System.Runtime.InteropServices;

          public static class C47FontLoader {
              [DllImport("gdi32.dll", CharSet = CharSet.Unicode, EntryPoint = "AddFontResourceW", SetLastError = true)]
              public static extern int AddFontResource(string lpFileName);

              [DllImport("user32.dll", EntryPoint = "SendMessageW", SetLastError = true)]
              public static extern IntPtr SendMessage(IntPtr hWnd, uint Msg, IntPtr wParam, IntPtr lParam);
          }
          '@

          $fontsAdded = [C47FontLoader]::AddFontResource($fontPath)
          if ($fontsAdded -lt 1) {
            throw "AddFontResource failed for $fontPath"
          }

          [void][C47FontLoader]::SendMessage([IntPtr]0xffff, 0x001D, [IntPtr]::Zero, [IntPtr]::Zero)
          Write-Host "Loaded $fontsAdded font resource(s) from $fontPath"

      - name: Build Windows simulator package
        env:
          CC: ${{ inputs.cc }}
          CXX: ${{ inputs.cxx }}
        run: |
          set -euo pipefail

          mkdir -p ci-artifacts/logs
          cd upstream
          chmod +x tools/onARaspberry

          export CC
          export CXX

          make dist_windows 2>&1 | tee ../ci-artifacts/logs/windows-package.log

      - name: Bundle stripped Windows runtime
        id: bundle
        run: |
          set -euo pipefail

          artifact_dir="artifact"
          release_dir="$artifact_dir/release"
          package_dir="$release_dir/c47-windows"
          stripped_count=0

          rm -rf "$artifact_dir"
          mkdir -p "$release_dir"

          unzip -q upstream/c47-windows.zip -d "$release_dir"

          if command -v llvm-strip > /dev/null 2>&1; then
            strip_tool=llvm-strip
          elif command -v strip > /dev/null 2>&1; then
            strip_tool=strip
          else
            echo "No strip tool found in PATH." >&2
            exit 1
          fi

          "$strip_tool" "$package_dir/c47.exe" "$package_dir/r47.exe"
          stripped_count=2

          dlls=$(for exe in "$package_dir/c47.exe" "$package_dir/r47.exe"; do
            ldd "$exe"
          done | awk -v prefix="$MINGW_PREFIX/bin/" '
            $3 ~ ("^" prefix) && $3 ~ /\.dll$/ { print $3 }
            $1 ~ ("^" prefix) && $1 ~ /\.dll$/ { print $1 }
          ' | sort -u)

          if [[ -z "$dlls" ]]; then
            echo "Failed to resolve runtime DLLs from $MINGW_PREFIX/bin." >&2
            exit 1
          fi

          while IFS= read -r dll; do
            [[ -n "$dll" ]] || continue
            cp "$dll" "$package_dir/"
          done <<< "$dlls"

          printf 'Stripped executable sizes:\n'
          stat -c '%n %s' "$package_dir/c47.exe" "$package_dir/r47.exe"

          cp upstream/COPYING "$package_dir/COPYING"

          cat > "$package_dir/SOURCE" <<EOF
          upstream_url=${{ inputs.upstream_url }}
          upstream_commit=${{ inputs.upstream_commit }}
          upstream_license_file=COPYING
          xlsxio_url=${{ inputs.xlsxio_url }}
          xlsxio_commit=${{ inputs.xlsxio_commit }}
          EOF

          find "$package_dir" -type f | sed "s#^$release_dir/##" | sort > "$release_dir/PACKAGE-CONTENTS.txt"

          cat > "$release_dir/BUILD-METADATA.txt" <<EOF
          upstream_url=${{ inputs.upstream_url }}
          upstream_commit=${{ inputs.upstream_commit }}
          upstream_license_file=COPYING
          source_manifest_file=SOURCE
          xlsxio_url=${{ inputs.xlsxio_url }}
          xlsxio_commit=${{ inputs.xlsxio_commit }}
          compiler=${{ inputs.compiler_label }}
          make_target=dist_windows
          msystem=${{ inputs.msystem }}
          strip_tool=$strip_tool
          stripped_files_count=$stripped_count
          package_dir=$(basename "$package_dir")
          EOF

          echo "artifact_path=$release_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Windows simulator artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.upstream_short }}
          path: ${{ steps.bundle.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.upstream_short }}-build-log
          path: ci-artifacts/logs/windows-package.log
          if-no-files-found: warn
          retention-days: 14